let sc='n',sd2=1;
const cities=[...new Set(V.map(v=>v.city).filter(c=>c&&c!='N/A'))].sort();
const cats=[...new Set(V.map(v=>v.cat))].sort();
const ce=document.getElementById('fc'),ke=document.getElementById('fk');
cities.forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=c;ce.appendChild(o);});
cats.forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=c;ke.appendChild(o);});
function gs(g){const m=(g||'').match(/([\d.]+)\//);return m?parseFloat(m[1]):-1;}
function bt(b){const u=(b||'').toUpperCase();if(u.startsWith('A'))return'a';if(u.startsWith('B'))return'b';if(u.startsWith('C')||u==='F')return'c';return'n';}
function bpill(b){const t=bt(b);const c={a:'ba',b:'bm',c:'bb',n:'bn'}[t];return '<span class="pill '+c+'">'+b+'</span>';}
function gpill(g){const s=gs(g);let c='gn';if(s>=4.5)c='ga';else if(s>=3.5)c='gm';else if(s>=0)c='gl';return '<span class="pill '+c+'">'+(g&&g!='N/A'?g:'N/A')+'</span>';}
function render(){
  const q=document.getElementById('q').value.toLowerCase();
  const city=document.getElementById('fc').value;
  const cat=document.getElementById('fk').value;
  const bbb=document.getElementById('fb').value;
  const goo=document.getElementById('fg').value;
  const dnu=document.getElementById('fd').value;
  const grp=document.getElementById('fg2').value;
  let f=V.filter(v=>{
    if(q&&!(v.n+v.city+v.cat+v.svc+v.notes).toLowerCase().includes(q))return false;
    if(city&&v.city!==city)return false;
    if(cat&&v.cat!==cat)return false;
    if(dnu==='ok'&&v.dnu)return false;
    if(dnu==='y'&&!v.dnu)return false;
    if(bbb){const t=bt(v.bbb);if(t!==bbb)return false;}
    if(goo){const s=gs(v.google);if(goo==='h'&&s<4.5)return false;if(goo==='m'&&(s<3.5||s>=4.5))return false;if(goo==='l'&&(s<0||s>=3.5))return false;if(goo==='n'&&s>=0)return false;}
    return true;
  });
  f.sort((a,b)=>{
    let av=sc==='google'?gs(a.google):a[sc]||'';
    let bv=sc==='google'?gs(b.google):b[sc]||'';
    return sd2*(av<bv?-1:av>bv?1:0);
  });
  document.getElementById('st').textContent=V.length;
  document.getElementById('sv').textContent=f.length;
  document.getElementById('sd').textContent=V.filter(v=>v.dnu).length;
  document.getElementById('sc2').textContent=new Set(f.map(v=>v.city).filter(c=>c&&c!='N/A')).size;
  const tb=document.getElementById('tb');
  const emp=document.getElementById('emp');
  if(!f.length){tb.innerHTML='';emp.style.display='';return;}
  emp.style.display='none';
  let html='';
  if(grp==='none'){f.forEach(v=>html+=row(v));}
  else{
    const key=grp==='city'?'city':'cat';
    const groups={};
    f.forEach(v=>{const k=v[key]||'N/A';(groups[k]=groups[k]||[]).push(v);});
    Object.keys(groups).sort().forEach(g=>{
      html+='<tr class="grh"><td colspan="9">'+(grp==='city'?'📍 ':'🏷️ ')+g+' — '+groups[g].length+' vendor'+(groups[g].length!==1?'s':'')+'</td></tr>';
      groups[g].forEach(v=>html+=row(v));
    });
  }
  tb.innerHTML=html;
}
function row(v){
  const db=v.dnu?'<span class="dnu-b">DO NOT USE</span>':'';
  const cb='<span class="cat-b">'+v.cat+'</span>';
  const ph=[v.ph,v.ph2].filter(Boolean).join('<br>');
  const em=[v.email&&'<a href="mailto:'+v.email+'">'+v.email+'</a>',v.email2&&'<a href="mailto:'+v.email2+'">'+v.email2+'</a>'].filter(Boolean).join('<br>');
  const web=v.web?'<a href="'+(v.web.startsWith('http')?v.web:'https://'+v.web)+'" target="_blank">Sitio web ↗</a>':'';
  const cont=v.contact?'<div>👤 '+v.contact+'</div>':'';
  return '<tr class="'+(v.dnu?'dr':'')+'"><td><div class="vn">'+db+v.n+'</div><div class="vs">'+v.svc+'</div></td><td>'+(v.city!='N/A'?v.city:'—')+'</td><td>'+cb+'</td><td>'+bpill(v.bbb)+'</td><td>'+gpill(v.google)+'</td><td>'+cont+em+'</td><td><div style="font-size:11px">'+ph+'</div></td><td>'+web+'</td><td class="note">'+v.notes+'</td></tr>';
}
function srt(col){if(sc===col)sd2*=-1;else{sc=col;sd2=1;}render();}
['q','fc','fk','fb','fg','fd','fg2'].forEach(id=>document.getElementById(id).addEventListener('input',render));
render();
</script>
